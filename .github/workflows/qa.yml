name: qa

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-22.04
    container: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install lint deps
        run: |
          apt-get update
          pip3 install flake8 pep257

      - name: flake8
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          ament_flake8 src/tello_control_pos

      - name: pep257
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          ament_pep257 src/tello_control_pos

  unit:
    runs-on: ubuntu-22.04
    container: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install rosdeps
        run: |
          apt-get update
          rosdep update
          rosdep install --from-paths src/tello_control_pos -y --ignore-src --rosdistro humble

      - name: Build
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --packages-select tello_control_pos --event-handlers console_direct+

      - name: Test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --packages-select tello_control_pos --event-handlers console_direct+
          colcon test-result --verbose
