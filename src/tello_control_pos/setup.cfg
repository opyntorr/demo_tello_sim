[develop]
script_dir=$base/lib/tello_control_pos
[install]
install_scripts=$base/lib/tello_control_pos

[flake8]
# Cosmetic rules the team has chosen not to enforce. Real-bug rules
# (undefined names, syntax errors, unused imports) stay on.
# E741: 'I' is a deliberate convention for the identity matrix in EKF code.
extend-ignore = W291,W293,E501,E302,E303,E305,E702,E741,E221
