        # Entrada de OptiTrack (alta confianza)
        pose0: /drone1/optitrack/pose_with_cov
        
        # The order is x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az.
